<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Exploration Hub — 動態幾何生成器</title>
    <link rel="stylesheet" href="../css/common.css?v=20260406">
    <link rel="stylesheet" href="../css/dse-geometry.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="hub-body">

    <!-- SIDEBAR NAVIGATION -->
    <aside class="sidebar" role="navigation" aria-label="主導覽">
        <div class="sidebar-brand">
            <div class="sidebar-logo" aria-hidden="true">∑</div>
            <div class="sidebar-brand-text">
                <span class="sidebar-brand-name">Math Hub</span>
                <span class="sidebar-brand-sub" data-i18n="sidebar.brandSub">Education Platform</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <span class="nav-section-label" data-i18n="nav.learningModules">學習模組</span>
            <a href="../index.html" class="nav-item">
                <span class="nav-item-icon" aria-hidden="true">📐</span>
                <span class="nav-item-label" data-i18n="nav.interactiveMath">互動數學視覺化</span>
            </a>

            <a href="dse-geometry.html" class="nav-item active" id="nav-dse" aria-current="page">
                <span class="nav-item-icon" aria-hidden="true">✨</span>
                <span class="nav-item-label" data-i18n="nav.geometryGen">動態幾何生成器</span>
                <span class="nav-item-badge">AI</span>
            </a>
            <a href="dse-algebra.html" class="nav-item" id="nav-dse-algebra">
                <span class="nav-item-icon" aria-hidden="true">🧮</span>
                <span class="nav-item-label" data-i18n="nav.algebraGen">代數問題生成器</span>
                <span class="nav-item-badge">AI</span>
            </a>

            <span class="nav-section-label" style="margin-top: 1rem;" data-i18n="nav.management">管理</span>
            <a href="my-problems.html" class="nav-item" id="nav-my-problems">
                <span class="nav-item-icon" aria-hidden="true">📚</span>
                <span class="nav-item-label" data-i18n="nav.myProblems">我的題庫</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <p class="sidebar-footer-text">COMP3122 · Group 11 · 2526 Sem 2</p>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="content-area">
        <div class="content-topbar">
            <div class="topbar-breadcrumb">
                <span>Math Hub</span>
                <span aria-hidden="true">›</span>
                <span class="current" data-i18n="geo.breadcrumb">動態幾何生成器</span>
            </div>
            <div class="topbar-actions"></div>
        </div>

        <main class="hub-main geometry-layout">
            <!-- Left Sidebar (Controls) -->
            <div class="geometry-panel geometry-controls">

                <section class="generator-box">
                    <h3 data-i18n="geo.genTitle">✨ 生成幾何題</h3>
                    <div class="form-group">
                        <label for="topic-input" data-i18n="geo.topicLabel">主題 (Topic)</label>
                        <select id="topic-input" class="form-control">
                            <option value="圓的幾何 (Geometry of Circle)" data-i18n="geo.topicCircle">圓的幾何 (Geometry of Circle)</option>
                            <option value="直線軌跡 (Locus)" data-i18n="geo.topicLocus">直線軌跡 (Locus)</option>
                            <option value="三角學 (Trigonometry)" data-i18n="geo.topicTrig">三角學 (Trigonometry)</option>
                            <option value="相似與全等 (Similarity & Congruence)" data-i18n="geo.topicSimilar">相似與全等 (Similarity & Congruence)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="difficulty-input" data-i18n="geo.diffLabel">難度 (Difficulty)</label>
                        <select id="difficulty-input" class="form-control">
                            <option value="DSE_Level_2" data-i18n="diff.level2">DSE Level 2 (基礎)</option>
                            <option value="DSE_Level_4" selected data-i18n="diff.level4">DSE Level 4 (中階)</option>
                            <option value="DSE_Level_5_star" data-i18n="diff.level5">DSE Level 5* (進階)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="prompt-input" data-i18n="geo.promptLabel">自訂指令 (Prompt)</label>
                        <textarea id="prompt-input" class="form-control" rows="3"
                            data-i18n-placeholder="geo.promptPlaceholder"
                            placeholder="例如：生成一題求圓周角的題目..."></textarea>
                    </div>
                    <button id="generate-btn" class="primary-btn full-width">
                        <span class="btn-text" data-i18n="geo.generateBtn">生成題目</span>
                        <div class="spinner" style="display: none;"></div>
                    </button>
                </section>

                <hr class="panel-divider">

                <section class="sliders-console" id="sliders-container">
                    <h3 data-i18n="geo.slidersTitle">🎛️ 動態操作面板</h3>
                    <div id="sliders-content">
                        <div class="empty-text" data-i18n="geo.slidersEmpty">生成題目後，此處將出現拖曳控制項。</div>
                    </div>
                </section>
            </div>

            <!-- Right Main Content -->
            <div class="geometry-panel geometry-canvas-area">

                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📐</div>
                    <h2 data-i18n="geo.emptyTitle">尚未生成題目</h2>
                    <p data-i18n="geo.emptyDesc">請從左側面板選擇主題並點擊「生成題目」，見證 AI 動態生成互動式幾何題。</p>
                </div>

                <!-- Skeleton Loader -->
                <div id="skeleton-loader" class="skeleton-loader style-hidden">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text short"></div>
                    <div class="skeleton skeleton-canvas"></div>
                </div>

                <!-- Rendering Area -->
                <div id="rendering-area" class="rendering-area style-hidden">
                    <div class="question-header">
                        <h2 data-i18n="geo.questionHeader">題目敘述</h2>
                    </div>
                    <div id="question-description" class="question-description">
                        <!-- LaTeX will be injected here -->
                    </div>

                    <div class="svg-container">
                        <svg id="geometry-svg" viewBox="-200 -200 400 400" xmlns="http://www.w3.org/2000/svg">
                            <!-- Definition for markers -->
                            <defs>
                                <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6"
                                    markerHeight="6" orient="auto-start-reverse">
                                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
                                </marker>
                            </defs>
                            <!-- Dynamic elements injected here -->
                            <g id="svg-elements"></g>
                        </svg>
                    </div>

                    <div class="marking-scheme">
                        <details>
                            <summary data-i18n="geo.markingScheme">查看評分標準 (Marking Scheme)</summary>
                            <div id="marking-content" class="marking-content"></div>
                        </details>
                    </div>

                    <details class="validation-report">
                        <summary data-i18n="geo.validationReport">🔍 驗證報告 (Validation Report)</summary>
                        <div id="validation-report-content" class="validation-report-content"></div>
                    </details>

                    <!-- Save / Export Actions -->
                    <div class="problem-actions" id="problem-actions">
                        <button id="save-problem-btn" class="action-btn save-btn" data-i18n="geo.save">
                            💾 儲存題目
                        </button>
                        <button id="export-json-btn" class="action-btn export-btn" data-i18n="geo.exportJson">
                            📥 導出 JSON
                        </button>
                        <button id="export-txt-btn" class="action-btn export-btn" data-i18n="geo.exportTxt">
                            📄 導出 TXT
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="../js/shared/i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/shared/supabase-config.js"></script>
    <script src="../js/shared/auth-guard.js"></script>
    <script src="../js/shared/mobile-nav.js"></script>
    <script src="../js/shared/db-service.js"></script>
    <script src="../js/generators/dse-geometry.js"></script>
</body>

</html>
