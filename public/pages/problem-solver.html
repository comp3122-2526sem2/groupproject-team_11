<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Problem Solver | Math Problem Solver</title>
    <link rel="stylesheet" href="../css/common.css?v=20260406">
    <link rel="stylesheet" href="../css/problem-solver.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="problem-solver-body">
    <div class="mesh-bg">
        <div class="color-blob blob-1"></div>
        <div class="color-blob blob-2"></div>
        <div class="color-blob blob-3"></div>
        <div class="color-blob blob-4"></div>
    </div>

    <header class="solver-header">
        <a href="../index.html" class="back-btn" data-i18n="solver.back">← 返回首頁</a>
        <h1 data-i18n="solver.title">📚 AI Math Problem Solver</h1>
        <p data-i18n="solver.desc">輸入你的數學題目，讓 AI 一步步引導你解題。</p>
    </header>

    <main class="solver-main">
        <!-- Problem Input Phase -->
        <section id="problem-input-section" class="solver-section active-section">
            <div class="solver-container">
                <div class="input-area">
                    <h2 data-i18n="solver.enterProblem">📝 輸入題目</h2>
                    <textarea id="problem-input" 
                              data-i18n-placeholder="solver.placeholder"
                              placeholder="輸入你的數學題目，例如：解 2x + 5 = 13..."
                              class="problem-textarea"></textarea>

                    <div class="upload-area">
                        <label for="problem-image-input" class="upload-label" data-i18n="solver.uploadLabel">📷 上傳題目圖片（可選）</label>
                        <input type="file" id="problem-image-input" accept="image/*" class="image-input">
                        <img id="problem-image-preview" class="image-preview" alt="Problem image preview" style="display: none;">
                    </div>

                    <div class="button-group">
                        <button id="submit-problem-btn" class="btn-primary" data-i18n="solver.analyze">
                            分析題目 ✨
                        </button>
                        <button id="example-btn" class="btn-secondary" data-i18n="solver.examples">
                            查看範例 📖
                        </button>
                    </div>
                </div>
                
                <!-- Example Problems -->
                <div class="examples-area" id="examples-area" style="display: none;">
                    <h3 data-i18n="solver.examplesTitle">📋 範例題目</h3>
                    <div class="examples-list">
                        <button class="example-card" data-problem="Solve the linear equation: 3x - 7 = 11" data-problem-zh="解一元一次方程：3x - 7 = 11">
                            <div class="example-tag" data-i18n="solver.tagLinear">一元一次方程</div>
                            <p>3x - 7 = 11</p>
                        </button>
                        <button class="example-card" data-problem="A right triangle has legs 3 and 4. Find the hypotenuse." data-problem-zh="直角三角形兩直角邊為 3 和 4，求斜邊。">
                            <div class="example-tag" data-i18n="solver.tagPythag">畢氏定理</div>
                            <p>a = 3, b = 4, find c</p>
                        </button>
                        <button class="example-card" data-problem="Find the area of a circle with radius 5." data-problem-zh="求半徑為 5 的圓的面積。">
                            <div class="example-tag" data-i18n="solver.tagCircle">圓形面積</div>
                            <p>A = πr², r = 5</p>
                        </button>
                        <button class="example-card" data-problem="Solve the quadratic equation: x² - 5x + 6 = 0" data-problem-zh="解二次方程：x² - 5x + 6 = 0">
                            <div class="example-tag" data-i18n="solver.tagQuadratic">二次方程</div>
                            <p>x² - 5x + 6 = 0</p>
                        </button>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loading-spinner" class="loading-spinner" style="display: none;">
                    <div class="spinner"></div>
                    <p data-i18n="solver.loading">AI 正在分析你的題目...</p>
                </div>
            </div>
        </section>

        <!-- Solving Phase -->
        <section id="solving-section" class="solver-section">
            <div class="solver-container">
                <!-- Problem Analysis -->
                <div class="problem-analysis-card">
                    <div class="problem-header">
                        <h2 data-i18n="solver.problem">📚 題目</h2>
                        <button id="restart-btn" class="btn-icon" data-i18n="solver.restart">🔄 重新開始</button>
                    </div>
                    <div id="problem-display" class="problem-display"></div>

                    <div class="completed-steps-panel">
                        <h3 data-i18n="solver.completedSteps">✅ 已完成步驟</h3>
                        <ol id="completed-steps-list" class="completed-steps-list"></ol>
                    </div>
                </div>

                <!-- Step-by-Step Solving -->
                <div class="solving-area">
                    <div class="steps-tracker">
                        <h3 data-i18n="solver.solvingSteps">📍 解題步驟</h3>
                        <div id="steps-list" class="steps-list"></div>
                    </div>

                    <div class="current-step-area">
                        <div id="step-guidance" class="step-guidance"></div>
                        
                        <div class="step-input-group">
                            <label for="step-input" data-i18n="solver.yourAnswer">你的答案：</label>
                            <textarea id="step-input"
                                      class="step-input"
                                      data-i18n-placeholder="solver.answerPlaceholder"
                                      placeholder="輸入你的答案（支援多行）..."
                                      rows="5"></textarea>
                            
                            <div class="step-buttons">
                                <div class="step-main-actions">
                                    <button id="submit-step-btn" class="btn-primary" data-i18n="solver.submitAnswer">
                                        提交答案 ✓
                                    </button>
                                    <button id="continue-step-btn" class="btn-secondary" style="display: none;" data-i18n="solver.continue">
                                        繼續 ➜
                                    </button>
                                    <button id="prev-step-btn" class="btn-secondary" data-i18n="solver.prevStep">
                                        ⬅ 回到上一步
                                    </button>
                                </div>
                                <div class="hint-buttons">
                                    <button id="hint-btn" class="btn-hint" data-i18n="solver.hint">
                                        💡 提示
                                    </button>
                                    <button id="show-answer-btn" class="btn-secondary" style="display: none;" data-i18n="solver.showAnswer">
                                        👀 顯示答案
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="step-feedback" class="step-feedback"></div>
                    </div>
                </div>

                <!-- Completion Message -->
                <div id="completion-area" class="completion-area" style="display: none;">
                    <div class="completion-card">
                        <div class="completion-icon">🎉</div>
                        <h2 data-i18n="solver.congrats">恭喜！你已成功解答題目。</h2>
                        <div id="final-solution" class="final-solution"></div>
                        <div class="completion-buttons">
                            <button id="try-another-btn" class="btn-primary" data-i18n="solver.tryAnother">
                                🚀 解更多題目
                            </button>
                            <button id="view-more-btn" class="btn-secondary" data-i18n="solver.exploreMore">
                                📚 探索其他模組
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Error Modal -->
    <div id="error-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="solver.error">⚠️ 錯誤</h3>
                <button class="modal-close" id="error-close-btn">✕</button>
            </div>
            <p id="error-message"></p>
            <button class="btn-primary" id="error-ok-btn" data-i18n="solver.ok">確定</button>
        </div>
    </div>

    <script src="../js/shared/i18n.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/shared/supabase-config.js"></script>
    <script src="../js/shared/auth-guard.js"></script>
    <script src="../js/shared/mobile-nav.js"></script>
    <script src="../js/shared/db-service.js"></script>
    <script src="problem-solver.js?v=20260402b"></script>
</body>
</html>
