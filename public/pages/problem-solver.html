<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Problem Solver | Math Problem Solver</title>
    <link rel="stylesheet" href="../css/common.css?v=20260406">
    <link rel="stylesheet" href="../css/problem-solver.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="problem-solver-body">
    <div class="mesh-bg">
        <div class="color-blob blob-1"></div>
        <div class="color-blob blob-2"></div>
        <div class="color-blob blob-3"></div>
        <div class="color-blob blob-4"></div>
    </div>

    <header class="solver-header">
        <a href="../index.html" class="back-btn">← Back to Home</a>
        <h1>📚 AI Math Problem Solver</h1>
        <p>Enter your math problem and let AI guide you step by step.</p>
    </header>

    <main class="solver-main">
        <!-- Problem Input Phase -->
        <section id="problem-input-section" class="solver-section active-section">
            <div class="solver-container">
                <div class="input-area">
                    <h2>📝 Enter Problem</h2>
                    <textarea id="problem-input" 
                              placeholder="Enter your math problem, for example: Solve 2x + 5 = 13..."
                              class="problem-textarea"></textarea>

                    <div class="upload-area">
                        <label for="problem-image-input" class="upload-label">📷 Upload Problem Image (Optional)</label>
                        <input type="file" id="problem-image-input" accept="image/*" class="image-input">
                        <img id="problem-image-preview" class="image-preview" alt="Problem image preview" style="display: none;">
                    </div>

                    <div class="button-group">
                        <button id="submit-problem-btn" class="btn-primary">
                            Analyze Problem ✨
                        </button>
                        <button id="example-btn" class="btn-secondary">
                            View Examples 📖
                        </button>
                    </div>
                </div>
                
                <!-- Example Problems -->
                <div class="examples-area" id="examples-area" style="display: none;">
                    <h3>📋 Example Problems</h3>
                    <div class="examples-list">
                        <button class="example-card" data-problem="Solve the linear equation: 3x - 7 = 11">
                            <div class="example-tag">Linear Equation</div>
                            <p>3x - 7 = 11</p>
                        </button>
                        <button class="example-card" data-problem="A right triangle has legs 3 and 4. Find the hypotenuse.">
                            <div class="example-tag">Pythagorean Theorem</div>
                            <p>a = 3, b = 4, find c</p>
                        </button>
                        <button class="example-card" data-problem="Find the area of a circle with radius 5.">
                            <div class="example-tag">Circle Area</div>
                            <p>A = πr², r = 5</p>
                        </button>
                        <button class="example-card" data-problem="Solve the quadratic equation: x² - 5x + 6 = 0">
                            <div class="example-tag">Quadratic Equation</div>
                            <p>x² - 5x + 6 = 0</p>
                        </button>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loading-spinner" class="loading-spinner" style="display: none;">
                    <div class="spinner"></div>
                    <p>AI is analyzing your problem...</p>
                </div>
            </div>
        </section>

        <!-- Solving Phase -->
        <section id="solving-section" class="solver-section">
            <div class="solver-container">
                <!-- Problem Analysis -->
                <div class="problem-analysis-card">
                    <div class="problem-header">
                        <h2>📚 Problem</h2>
                        <button id="restart-btn" class="btn-icon">🔄 Restart</button>
                    </div>
                    <div id="problem-display" class="problem-display"></div>

                    <div class="completed-steps-panel">
                        <h3>✅ Completed Steps</h3>
                        <ol id="completed-steps-list" class="completed-steps-list"></ol>
                    </div>
                </div>

                <!-- Step-by-Step Solving -->
                <div class="solving-area">
                    <div class="steps-tracker">
                        <h3>📍 Solving Steps</h3>
                        <div id="steps-list" class="steps-list"></div>
                    </div>

                    <div class="current-step-area">
                        <div id="step-guidance" class="step-guidance"></div>
                        
                        <div class="step-input-group">
                            <label for="step-input">Your Answer:</label>
                            <textarea id="step-input"
                                      class="step-input"
                                      placeholder="Enter your answer (multi-line supported)..."
                                      rows="5"></textarea>
                            
                            <div class="step-buttons">
                                <div class="step-main-actions">
                                    <button id="submit-step-btn" class="btn-primary">
                                        Submit Answer ✓
                                    </button>
                                    <button id="continue-step-btn" class="btn-secondary" style="display: none;">
                                        Continue ➜
                                    </button>
                                    <button id="prev-step-btn" class="btn-secondary">
                                        ⬅ Back to Previous Step
                                    </button>
                                </div>
                                <div class="hint-buttons">
                                    <button id="hint-btn" class="btn-hint">
                                        💡 Hint
                                    </button>
                                    <button id="show-answer-btn" class="btn-secondary" style="display: none;">
                                        👀 Show Answer
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="step-feedback" class="step-feedback"></div>
                    </div>
                </div>

                <!-- Completion Message -->
                <div id="completion-area" class="completion-area" style="display: none;">
                    <div class="completion-card">
                        <div class="completion-icon">🎉</div>
                        <h2>Congratulations! You solved the problem.</h2>
                        <div id="final-solution" class="final-solution"></div>
                        <div class="completion-buttons">
                            <button id="try-another-btn" class="btn-primary">
                                🚀 Solve Another Problem
                            </button>
                            <button id="view-more-btn" class="btn-secondary">
                                📚 Explore Other Modules
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Error Modal -->
    <div id="error-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚠️ Error</h3>
                <button class="modal-close" id="error-close-btn">✕</button>
            </div>
            <p id="error-message"></p>
            <button class="btn-primary" id="error-ok-btn">OK</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/shared/supabase-config.js"></script>
    <script src="../js/shared/auth-guard.js"></script>
    <script src="../js/shared/db-service.js"></script>
    <script src="problem-solver.js?v=20260402b"></script>
</body>
</html>
